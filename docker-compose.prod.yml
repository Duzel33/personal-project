services:
  api:
    build: ./backend
    expose:
      - "8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env

  nginx:
    build: 
      context: .
      dockerfile: ./webserver/Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sales_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: